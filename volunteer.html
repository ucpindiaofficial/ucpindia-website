<section class="sub-hero">
  <h1>Volunteer with UCP</h1>
</section>

<main class="container">
  <div class="content-box">

    <p>Volunteers are the heart of UCP. You can contribute time, skills, and ideas.</p>

    <form action="https://formsubmit.co/YOUR_EMAIL" method="POST" class="contact-form">
      <input type="hidden" name="_subject" value="New Volunteer Signup – UCP">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="phone" placeholder="Phone Number (optional)">
      <input type="text" name="city" placeholder="City / Area" required>

      <textarea name="areas" rows="4" placeholder="Areas you want to volunteer in (outreach, research, tech, design, etc.)" required></textarea>

      <button class="btn btn-primary" type="submit">Sign Up as Volunteer</button>
    </form>

  </div>
</main>
